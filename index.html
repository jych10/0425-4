<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bio-Escape 3D: The Crossroad</title>
    <style>
        :root {
            --blood-red: #ff3333;
            --vein-blue: #0055ff;
            --nerve-gold: #ffd700;
            --wall-color: #1a0505;
        }

        body {
            margin: 0;
            background-color: #000;
            color: white;
            font-family: 'Segoe UI', "Microsoft JhengHei", sans-serif;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        /* 頂部 HUD */
        #hud {
            width: 100%;
            padding: 15px;
            display: flex;
            justify-content: space-around;
            background: linear-gradient(to bottom, #300, #000);
            border-bottom: 2px solid var(--blood-red);
            z-index: 20;
        }
        .stat-item { text-align: center; }
        .value { display: block; font-size: 1.3em; color: var(--nerve-gold); font-weight: bold; }

        /* 3D 視窗 */
        #viewport {
            position: relative;
            width: 100vw;
            height: 85vh;
            perspective: 1000px;
            overflow: hidden;
        }

        #maze-3d {
            width: 100%;
            height: 100%;
            display: flex;
            justify-content: center;
            align-items: center;
            transition: transform 0.5s ease;
        }

        /* 路口門戶 */
        .crossroad-container {
            display: flex;
            gap: 50px;
            transform-style: preserve-3d;
        }

        .door {
            width: 250px;
            height: 400px;
            background: linear-gradient(45deg, #200, #400);
            border: 4px solid var(--vein-blue);
            border-radius: 10px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            cursor: pointer;
            transition: all 0.3s;
            box-shadow: 0 0 30px rgba(0, 85, 255, 0.3);
            padding: 20px;
            text-align: center;
        }

        .door:hover {
            transform: scale(1.05) translateZ(50px);
            border-color: var(--nerve-gold);
            box-shadow: 0 0 50px var(--nerve-gold);
        }

        .door-label {
            font-size: 1.2em;
            color: #fff;
            margin-top: 15px;
            font-weight: bold;
        }

        /* 題目顯示區 */
        #question-panel {
            position: absolute;
            top: 20px;
            left: 50%;
            transform: translateX(-50%);
            width: 80%;
            max-width: 800px;
            background: rgba(0, 0, 0, 0.7);
            padding: 20px;
            border-radius: 15px;
            border-left: 5px solid var(--nerve-gold);
            text-align: center;
            backdrop-filter: blur(10px);
        }

        /* 撞牆視覺特效 */
        .crash-overlay {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(255, 0, 0, 0.5);
            display: none;
            justify-content: center;
            align-items: center;
            z-index: 50;
            animation: flash 0.5s infinite;
        }

        @keyframes flash {
            0% { opacity: 0.8; } 50% { opacity: 0.3; } 100% { opacity: 0.8; }
        }

        #menu-overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: radial-gradient(circle, #300 0%, #000 100%);
            display: flex; flex-direction: column;
            justify-content: center; align-items: center; z-index: 100;
            text-align: center;
        }

        .btn-start {
            padding: 15px 50px; font-size: 1.5em; cursor: pointer;
            background: var(--blood-red); color: white; border: none; border-radius: 50px;
        }
    </style>
</head>

<div id="hud">

        gameState.active = true;
        gameState.stamina = 100;
        gameState.currentStep = 0;
        gameState.usedIndices = [];
        updateUI();
        nextLevel();
    }

        if (!gameState.active) return;
        
        // 隨機選題
        let index;
        do {
            index = Math.floor(Math.random() * questions.length);
        } while (gameState.usedIndices.includes(index));
        gameState.usedIndices.push(index);
        
        const qData = questions[index];
        document.getElementById('q-text').innerText = `[關卡 ${gameState.currentStep + 1}] ${qData.q}`;
        
        // 生成路口
        const container = document.getElementById('doors-container');
        container.innerHTML = '';
        
        // 答案隨機排序
        let options = qData.a.map((text, i) => ({ text, originalIdx: i }));
        options.sort(() => Math.random() - 0.5);

        options.forEach(opt => {
            const door = document.createElement('div');
            door.className = 'door';
            door.innerHTML = `
                <div style="font-size: 3em;">🚪</div>
                <div class="door-label">${opt.text}</div>
            `;
            door.onclick = () => handleChoice(opt.originalIdx, qData.correct, qData.a[qData.correct]);
            container.appendChild(door);
        });

        // 3D 進入動畫
        const maze = document.getElementById('maze-3d');
        maze.style.transition = 'none';
        maze.style.transform = 'translateZ(-500px) scale(0.5)';
        setTimeout(() => {
            maze.style.transition = 'transform 0.8s ease-out';
            maze.style.transform = 'translateZ(0px) scale(1)';
        }, 50);
    }

    function handleChoice(chosen, correct, correctText) {
        if (chosen === correct) {
            // 答對動畫：衝入正確門戶
            const maze = document.getElementById('maze-3d');
            maze.style.transform = 'translateZ(1000px) scale(2)';
            gameState.currentStep++;
            updateUI();
            
            setTimeout(() => {
                if (gameState.currentStep >= gameState.totalSteps) endGame(true);
                else nextLevel();
            }, 600);
        } else {
            // 答錯動畫：撞牆
            showCrash(correctText);
            gameState.stamina -= 20;
            updateUI();
            
            setTimeout(() => {
                if (gameState.stamina <= 0) endGame(false);
                else nextLevel();
            }, 2500);
        }
    }

    function showCrash(correctText) {
        const overlay = document.getElementById('crash-overlay');
        const hint = document.getElementById('correct-answer-hint');
        hint.innerText = `正確答案是：${correctText}`;
        overlay.style.display = 'flex';
        
        setTimeout(() => {
            overlay.style.display = 'none';
        }, 2500);
    }

    function updateUI() {
        document.getElementById('stamina').innerText = gameState.stamina;
        document.getElementById('steps').innerText = `${gameState.currentStep} / ${gameState.totalSteps}`;
    }

    function endGame(isWin) {
        gameState.active = false;
        const menu = document.getElementById('menu-overlay');
        menu.style.display = 'flex';
        if (isWin) {
            menu.innerHTML = `
                <h1 style="color:var(--nerve-gold)">逃出成功！</h1>
                <p>你完美通過了 20 個知識岔路。</p>
                <button class="btn-start" onclick="location.reload()">重新遊玩</button>
            `;
        } else {
            menu.innerHTML = `
                <h1 style="color:red">體力衰竭</h1>
                <p>你在迷宮中撞擊過多，無法前行。</p>
                <button class="btn-start" onclick="location.reload()">再次嘗試</button>
            `;
        }
    }
</script>

</body>
</html>
